<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU Stress</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = 608;
canvas.height = 1080;

const gl = canvas.getContext('webgl2', {
  powerPreference: 'high-performance',
  alpha: false,
  antialias: false,
  premultipliedAlpha: false,
  failIfMajorPerformanceCaveat: true
});

if (!gl) {
  document.body.innerHTML = '<h1 style="color:red">WebGL2 not available</h1>';
  throw new Error('WebGL2 required');
}

gl.disable(gl.DEPTH_TEST);
gl.disable(gl.BLEND);
gl.disable(gl.CULL_FACE);

const vs = gl.createShader(gl.VERTEX_SHADER);
gl.shaderSource(vs, `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`);
gl.compileShader(vs);

const fs = gl.createShader(gl.FRAGMENT_SHADER);
gl.shaderSource(fs, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;
uniform float u_time;

// Heavy per-pixel computation
vec3 hash(vec3 p) {
  p = fract(p * 0.3183099 + 0.1);
  p *= 17.0;
  return fract(p * p * (p + vec3(0.333, 0.567, 0.789)));
}

float noise(vec3 p) {
  vec3 i = floor(p);
  vec3 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(mix(hash(i).x, hash(i + vec3(1,0,0)).x, f.x),
        mix(hash(i + vec3(0,1,0)).x, hash(i + vec3(1,1,0)).x, f.x), f.y),
    mix(mix(hash(i + vec3(0,0,1)).x, hash(i + vec3(1,0,1)).x, f.x),
        mix(hash(i + vec3(0,1,1)).x, hash(i + vec3(1,1,1)).x, f.x), f.y),
    f.z
  );
}

float fbm(vec3 p) {
  float v = 0.0;
  float a = 0.5;
  for (int i = 0; i < 8; i++) {
    v += a * noise(p);
    p *= 2.0;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = v_uv * 2.0 - 1.0;
  uv.x *= 608.0 / 1080.0;

  vec3 col = vec3(0.0);
  float t = u_time * 0.3;

  // Multiple octaves of 3D noise — heavy per-pixel
  for (int i = 0; i < 3; i++) {
    vec3 p = vec3(
      uv.x + t * float(i + 1) * 0.1,
      uv.y * 2.0 + t * 0.2,
      t + float(i) * 1.7
    );
    float n = fbm(p);
    col += vec3(n * 0.5 + 0.5, n * 0.3, n * 0.8);
  }

  col /= 3.0;

  // Post-processing: heavy bloom simulation
  vec3 bloom = vec3(0.0);
  for (int x = -2; x <= 2; x++) {
    for (int y = -2; y <= 2; y++) {
      vec2 offset = vec2(float(x), float(y)) * 0.005;
      vec3 p = vec3(uv + offset + t * 0.05, t * 0.5);
      bloom += vec3(fbm(p));
    }
  }
  col += bloom / 25.0 * 0.3;

  // Tonemap
  col = col / (col + vec3(1.0));
  col = pow(col, vec3(0.4545));

  fragColor = vec4(col, 1.0);
}`);
gl.compileShader(fs);

const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error(gl.getProgramInfoLog(prog));
}

const timeLoc = gl.getUniformLocation(prog, 'u_time');

const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

const posLoc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

function frame(time) {
  gl.uniform1f(timeLoc, time * 0.001);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
