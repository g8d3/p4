<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Agent Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;height:100dvh;display:flex;flex-direction:column;font-family:sans-serif}
#screen{flex:1;display:flex;align-items:center;justify-content:center;background:#222}
#screen canvas{max-width:100%;max-height:100%;display:block}
#subtitle{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:16px 24px;font-size:clamp(24px,5vw,48px);color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);background:rgba(0,0,0,.55);min-height:64px;display:flex;align-items:center;justify-content:center;z-index:10;line-height:1.3;word-break:break-word}
#audio-dot{position:fixed;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:#555;z-index:20;transition:background .3s}
#tap-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);color:#fff;font-size:clamp(18px,4vw,28px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;cursor:pointer;-webkit-user-select:none;user-select:none;font-family:sans-serif;gap:12px}
#tap-overlay .sub{font-size:clamp(14px,3vw,20px);opacity:.7}
#status{position:fixed;top:10px;left:10px;color:#888;font-size:12px;z-index:20;font-family:monospace}
audio{display:none}
</style>
</head>
<body>
<div id="tap-overlay">Loading...<div class="sub" id="overlay-sub">cargando noVNC</div></div>
<div id="screen"></div>
<div id="subtitle"></div>
<div id="status"></div>
<div id="audio-dot"></div>
<audio id="a" autoplay></audio>
<script>
// Show interactive state immediately (before modules load)
document.getElementById('tap-overlay').innerHTML = 'Tap to connect<div class="sub" id="overlay-sub">toca para empezar</div>';
document.getElementById('overlay-sub').textContent = 'cargando noVNC...';
</script>
<script type="module">
import RFB from '/novnc/core/rfb.js';

document.getElementById('overlay-sub').textContent = 'listo';

const screen = document.getElementById('screen');
const sub = document.getElementById('subtitle');
const audio = document.getElementById('audio');
const overlay = document.getElementById('tap-overlay');
const dot = document.getElementById('audio-dot');
const status = document.getElementById('status');
const overlaySub = document.getElementById('overlay-sub');

function log(msg) {
  status.textContent = msg;
}

async function pollSubtitle() {
  try {
    sub.textContent = await (await fetch('/subtitle')).text();
  } catch (_) {}
  setTimeout(pollSubtitle, 800);
}
pollSubtitle();

overlay.addEventListener('click', () => {
  log('Connecting...');
  overlaySub.textContent = 'Connecting...';

  try {
    const url = 'ws://' + location.host + '/vnc';
    const rfb = new RFB(screen, url, {
      scaleViewport: true,
      resizeSession: false,
    });

    rfb.addEventListener('connect', () => {
      log('Connected');
      dot.style.background = '#0f0';
      overlay.remove();
      audio.src = '/audio';
      audio.play().catch(() => {});
    });

    rfb.addEventListener('disconnect', (e) => {
      log('Disconnected: ' + (e.detail?.clean ? 'clean' : 'unexpected'));
      dot.style.background = '#f00';
      overlaySub.textContent = 'Disconnected — tap to retry';
      overlay.style.display = 'flex';
    });

    rfb.addEventListener('securityfailure', (e) => {
      log('Security error: ' + (e.detail?.status || 'unknown'));
    });

    rfb.addEventListener('desktopname', (e) => {
      log('Desktop: ' + e.detail?.name);
    });

    setTimeout(() => {
      if (dot.style.background !== '#0f0') {
        log('Connection timeout');
        overlaySub.textContent = 'Connection failed — tap to retry';
      }
    }, 30000);

  } catch (err) {
    log('Error: ' + err.message);
    overlaySub.textContent = 'Error: ' + err.message;
  }
});
</script>
</body>
</html>
