<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xiaomi MIMO — TTS & ASR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;padding:12px;max-width:500px;margin:0 auto}
h1{color:#e94560;font-size:17px;margin-bottom:2px}
.sub{color:#888;font-size:12px;margin-bottom:12px}
section{background:#1a1a2e;border-radius:8px;padding:12px;margin-bottom:10px}
h2{font-size:14px;margin-bottom:8px;color:#ddd}
label{font-size:11px;color:#aaa;margin-bottom:2px;display:block}
textarea,input,select{width:100%;padding:7px;border:1px solid #333;border-radius:5px;background:#0d0d1a;color:#eee;font-size:13px;margin-bottom:6px;font-family:inherit}
textarea{resize:vertical;min-height:55px}
.row{display:flex;gap:5px}.row>*{flex:1}
button{padding:7px;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;margin-bottom:3px}
.btn-p{background:#e94560;color:#fff}.btn-p:active{background:#c73a52}
.btn-s{background:#333;color:#eee}.btn-s:active{background:#444}
.btn-r{background:#c62828;color:#fff}.btn-g{background:#2e7d32;color:#fff}
audio{width:100%;margin-top:5px;border-radius:4px}
.result{background:#0d0d1a;border-radius:4px;padding:8px;margin-top:5px;font-size:12px;color:#ccc;white-space:pre-wrap;word-break:break-word}
.result strong{color:#4caf50}
.spinner{display:none;text-align:center;padding:8px;color:#888;font-size:12px}
.spinner.active{display:block}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.tags button{font-size:10px;padding:3px 6px;background:#2a2a3e;color:#aaa;border:1px solid #333;border-radius:3px;font-weight:400}
.tags button:active{background:#3a3a5e}
.sticker-bar{display:flex;flex-wrap:wrap;gap:3px;margin:4px 0}
.sticker-bar button{font-size:9px;padding:2px 5px;background:#1a1a2e;color:#888;border:1px solid #333;border-radius:3px;font-weight:400;margin:0}
.sticker-bar button:active{background:#2a2a3e;color:#e94560}
.vg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:6px}
.vg button{padding:3px;font-size:10px;border:1px solid #333;border-radius:3px;background:#0d0d1a;color:#aaa;cursor:pointer;text-align:center;margin:0}
.vg button.act{border-color:#e94560;color:#e94560;background:#1a1a2e}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:5px}
.stat{border-radius:3px;padding:5px 6px;background:#111;font-size:10px}
.stat .v{color:#eee;font-size:12px;font-weight:600}
.stat .l{color:#888}
.rec-icon{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px}
.rec-icon.on{background:#f44336;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tx-box{background:#0d0d1a;border-radius:4px;padding:8px;font-size:12px;color:#ddd;min-height:40px;max-height:120px;overflow-y:auto;white-space:pre-wrap;margin-top:5px}
.raw-box{background:#0a0a14;border:1px solid #333;border-radius:4px;padding:8px;margin-top:4px;font-family:monospace;font-size:11px;color:#8ae;white-space:pre;overflow-x:auto;max-height:200px}
.toggle{font-size:10px;color:#888;cursor:pointer;text-decoration:underline;margin:2px 0 4px;display:inline-block}
.toggle:hover{color:#aaa}
</style>
</head>
<body>
<h1>Xiaomi MIMO</h1>
<p class="sub">TTS with style control + live ASR</p>

<section>
<h2>🔊 TTS</h2>

<div class="row">
<div>
<label>Model</label>
<select id="tts-model">
<option value="mimo-v2.5-tts">v2.5-tts (recommended)</option>
<option value="mimo-v2-tts">v2-tts</option>
<option value="mimo-v2.5-tts-voicedesign">v2.5-voicedesign</option>
<option value="mimo-v2.5-tts-voiceclone">v2.5-voiceclone</option>
</select>
</div>
<div>
<label>Format</label>
<select id="tts-format">
<option value="mp3">MP3</option><option value="wav">WAV</option><option value="pcm">PCM</option><option value="pcm16">PCM16</option>
</select>
</div>
</div>

<div id="voice-section">
<label>Voice</label>
<div class="vg" id="vg"></div>
</div>

<div id="sample-section" style="display:none">
<label>Voice sample audio (MP3 or WAV)</label>
<input type="file" id="sample-file" accept="audio/mpeg,audio/wav">
</div>

<label id="prompt-label">Style instruction (optional)</label>
<input id="tts-prompt" placeholder='e.g. "Bright and cheerful, fast pace" or voice description for voicedesign'>

<label>Text to synthesize</label>
<textarea id="tts-text" placeholder="Type the text to speak...">Hello, this is a test of the Xiaomi text to speech system.</textarea>

<label>🎯 Insert audio tag</label>
<div class="sticker-bar" id="sticker-bar"></div>

<label>📋 Examples</label>
<div class="tags" id="examples"></div>

<span class="toggle" onclick="const r=document.getElementById('raw-box');r.style.display=r.style.display==='none'?'block':'none'">📄 Toggle raw request (cURL)</span>
<div class="raw-box" id="raw-box"></div>

<button class="btn-p" onclick="genTTS()">▶ Generate & Listen</button>
<div class="spinner" id="ts">Generating...</div>
<audio id="ta" controls style="display:none"></audio>
<div class="result" id="tr"></div>
<div class="stats" id="tts-stats" style="display:none"></div>
</section>

<section>
<h2>🎤 Live ASR <span style="font-size:10px;color:#888;font-weight:400">(requires HTTPS 🔒)</span></h2>
<div class="row">
<button class="btn-g" id="rec-btn" onclick="toggleRec()">🎙 Record</button>
<button class="btn-s" onclick="clearTrans()">Clear</button>
</div>
<div class="tx-box" id="trans-box">Press record and start speaking...</div>
<div class="result" id="ar"></div>
</section>

<script>
const VOICES = ["Mia","Chloe","Milo","Dean","mimo_default","冰糖","茉莉","苏打","白桃"];
const TAGS = ["(Happy)","(Sad)","(Angry)","(Whisper)","(Lazy)","(Excited)","(Sighing)","(Magnetic)","(Fearful)","(Calm)","(singing)","[trembling]","[smile]","[cough]","[sigh]","[laugh]","[whisper]","[nervous]","[pauses]","[takes a deep breath]"];
let rec = null, chunks = [], transText = "";

function init() {
  const g = document.getElementById("vg");
  let sel = "Mia";
  VOICES.forEach(v => {
    const b = document.createElement("button");
    b.textContent = v;
    b.onclick = () => { g.querySelectorAll("button").forEach(x => x.classList.remove("act")); b.classList.add("act"); sel = v; };
    if (v === "Mia") b.classList.add("act");
    g.appendChild(b);
  });
  window.__v = () => sel;

  const sb = document.getElementById("sticker-bar");
  TAGS.forEach(t => {
    const b = document.createElement("button");
    b.textContent = t;
    b.onclick = () => {
      const ta = document.getElementById("tts-text");
      ta.value = t + " " + ta.value;
      ta.focus();
    };
    sb.appendChild(b);
  });

  async function updateRaw() {
    const text = document.getElementById("tts-text").value.trim();
    if (!text) return;
    const body = {text, voice: window.__v(), model: document.getElementById("tts-model").value, format: document.getElementById("tts-format").value, dry_run: true};
    const p = document.getElementById("tts-prompt").value.trim();
    if (p) body.prompt = p;
    try {
      const r = await fetch("/tts", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
      const j = await r.json();
      document.getElementById("raw-box").textContent = 'curl -X POST "' + location.origin + '/tts" \\\n  -H "Content-Type: application/json" \\\n  -d \\\n' + JSON.stringify(j, null, 2);
    } catch(e) {}
  }
  // Model change UI
  function updateModelUI() {
    const m = document.getElementById("tts-model").value;
    const isVD = m.includes("voicedesign");
    const isVC = m.includes("voiceclone");
    document.getElementById("voice-section").style.display = (isVD || isVC) ? "none" : "block";
    document.getElementById("sample-section").style.display = isVC ? "block" : "none";
    document.getElementById("prompt-label").textContent = isVD ? "Voice description (describe the voice you want)" : "Style instruction (optional)";
    document.getElementById("tts-prompt").placeholder = isVD ? 'e.g. "Young female, soft ASMR, close to the microphone"' : 'e.g. "Bright and cheerful, fast pace"';
    updateRaw();
  }
  document.getElementById("tts-model").addEventListener("change", updateModelUI);

  // Update raw on any change
  ["tts-text","tts-prompt","tts-model","tts-format"].forEach(id => {
    document.getElementById(id).addEventListener("input", updateRaw);
    document.getElementById(id).addEventListener("change", updateRaw);
  });
  // Update raw when voice changes
  document.getElementById("vg").addEventListener("click", () => setTimeout(updateRaw, 50));

  fetch("/models").then(r => r.json()).then(data => {
    const ex = document.getElementById("examples");
    data.examples.forEach(e => {
      const b = document.createElement("button");
      b.textContent = e.name;
      b.onclick = () => {
        document.getElementById("tts-text").value = e.text;
        if (e.prompt) document.getElementById("tts-prompt").value = e.prompt;
        if (e.model) document.getElementById("tts-model").value = e.model;
        updateRaw();
      };
      ex.appendChild(b);
    });
  }).catch(() => {});

  const a = document.getElementById("ta");
  a.onended = () => a.style.display = "none";
  // Initial raw update
  setTimeout(updateRaw, 500);
}

async function genTTS() {
  const text = document.getElementById("tts-text").value.trim();
  if (!text) return;
  const model = document.getElementById("tts-model").value;
  const fmt = document.getElementById("tts-format").value;
  const prompt = document.getElementById("tts-prompt").value.trim();
  const sampleFile = document.getElementById("sample-file").files[0];
  const sp = document.getElementById("ts"), res = document.getElementById("tr"),
        a = document.getElementById("ta"), st = document.getElementById("tts-stats"),
        rb = document.getElementById("raw-box");
  sp.classList.add("active"); res.textContent = ""; a.style.display = "none"; st.style.display = "none";
  try {
    let body = {text, model, format: fmt};
    if (model.includes("voiceclone") && sampleFile) {
      // Upload sample + TTS text via multipart
      const fd = new FormData();
      fd.append("text", text);
      fd.append("model", model);
      fd.append("format", fmt);
      fd.append("sample", sampleFile);
      if (prompt) fd.append("prompt", prompt);
      const r = await fetch("/tts-clone", {method:"POST", body:fd});
      if (!r.ok) { const err = await r.text(); res.textContent = "Error: " + err; return; }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      a.src = url; a.style.display = "block"; a.play();
      res.innerHTML = "<strong>✓</strong> OK";
      showStats(blob, fmt, model, "clone");
      return;
    }
    body.voice = window.__v();
    if (prompt) body.prompt = prompt;
    const r = await fetch("/tts", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    if (!r.ok) { const err = await r.text(); try { const j = JSON.parse(err); const msg = typeof j.error === 'object' ? (j.error.message || j.error.param || JSON.stringify(j.error)) : (j.error || j.message || err); res.textContent = "Error: " + msg; } catch { res.textContent = "Error: " + err; } return; }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    a.src = url; a.style.display = "block"; a.play();
    res.innerHTML = "<strong>✓</strong> OK";
    showStats(blob, fmt, model, window.__v());
  } catch(e) { res.textContent = "Error: " + e.message; }
  finally { sp.classList.remove("active"); }
}

async function toggleRec() {
  const btn = document.getElementById("rec-btn");
  if (rec && rec.state === "recording") { rec.stop(); btn.className = "btn-g"; btn.innerHTML = "🎙 Record"; return; }
  if (!navigator.mediaDevices) { document.getElementById("ar").textContent = "Recording not supported"; return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    transText = "";
    document.getElementById("trans-box").textContent = "Listening...";
    document.getElementById("ar").textContent = "";
    let transcribing = false;
    rec = new MediaRecorder(stream, {mimeType: 'audio/webm;codecs=opus'});
    rec.ondataavailable = async (e) => {
      if (e.data.size === 0 || transcribing) return;
      transcribing = true;
      const fd = new FormData(); fd.append("audio", e.data, "chunk.webm");
      try {
        const r = await fetch("/asr", {method:"POST", body:fd});
        if (!r.ok) return;
        const data = await r.json();
        if (data.text) { transText += (transText ? " " : "") + data.text; document.getElementById("trans-box").textContent = transText; }
      } catch(e) {}
      transcribing = false;
    };
    rec.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
    rec.start(2500); // emit chunk every 2.5s
    btn.className = "btn-r"; btn.innerHTML = '<span class="rec-icon on"></span>Stop';
  } catch(e) {
    document.getElementById("ar").textContent = e.name === "NotAllowedError"
      ? "🔒 Permission denied. Open 🔒 in address bar → Microphone → Allow, then reload."
      : "Error: " + e.message;
  }
}

function showStats(blob, fmt, model, voice) {
  const st = document.getElementById("tts-stats");
  const kb = (blob.size / 1024).toFixed(1);
  let h = `<div class="stat"><div class="l">Size</div><div class="v">${kb} KB</div></div>`;
  h += `<div class="stat"><div class="l">Format</div><div class="v">${fmt.toUpperCase()}</div></div>`;
  h += `<div class="stat"><div class="l">Model</div><div class="v">${model}</div></div>`;
  h += `<div class="stat"><div class="l">Voice</div><div class="v">${voice}</div></div>`;
  const a = document.getElementById("ta");
  a.onloadedmetadata = () => {
    const secs = a.duration;
    if (secs && isFinite(secs)) {
      const m = Math.floor(secs / 60), s = Math.floor(secs % 60);
      st.innerHTML = h + `<div class="stat"><div class="l">Duration</div><div class="v">${m}:${s.toString().padStart(2,'0')}</div></div>`;
    } else { st.innerHTML = h; }
    st.style.display = "grid";
  };
  setTimeout(() => { if (st.style.display === "none") { st.innerHTML = h; st.style.display = "grid"; } }, 2000);
}

function clearTrans() { transText = ""; chunks = []; document.getElementById("trans-box").textContent = "Press record and start speaking..."; document.getElementById("ar").textContent = ""; }

init();
</script>
</body>
</html>
