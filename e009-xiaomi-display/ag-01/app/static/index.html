<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xiaomi API — TTS & ASR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;padding:16px;max-width:480px;margin:0 auto}
h1{color:#e94560;font-size:18px;margin-bottom:4px}
p{color:#888;font-size:13px;margin-bottom:16px}
section{background:#1a1a2e;border-radius:8px;padding:16px;margin-bottom:16px}
h2{font-size:15px;margin-bottom:12px;color:#ddd}
label{display:block;font-size:13px;color:#aaa;margin-bottom:4px}
textarea,input,select{width:100%;padding:10px;border:1px solid #333;border-radius:6px;background:#0d0d1a;color:#eee;font-size:14px;margin-bottom:12px;font-family:inherit}
textarea{resize:vertical;min-height:80px}
button{width:100%;padding:12px;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:600;margin-bottom:8px}
.btn-p{background:#e94560;color:#fff}
.btn-p:active{background:#c73a52}
.btn-s{background:#333;color:#eee}
.btn-s:active{background:#444}
.btn-r{background:#c62828;color:#fff}
.btn-r:active{background:#b71c1c}
.btn-g{background:#2e7d32;color:#fff}
audio{width:100%;margin-top:8px;border-radius:6px}
.result{background:#0d0d1a;border-radius:6px;padding:12px;margin-top:8px;font-size:14px;color:#ccc;white-space:pre-wrap;word-break:break-word}
.result strong{color:#4caf50}
.spinner{display:none;text-align:center;padding:12px;color:#888}
.spinner.active{display:block}
.vg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.vg button{padding:6px;font-size:11px;border:1px solid #333;border-radius:4px;background:#0d0d1a;color:#aaa;cursor:pointer;text-align:center;margin:0}
.vg button.act{border-color:#e94560;color:#e94560;background:#1a1a2e}
.row{display:flex;gap:8px}
.row button{flex:1}
.rec-icon{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.rec-icon.on{background:#f44336;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tx-box{background:#0d0d1a;border-radius:6px;padding:12px;font-size:14px;color:#ddd;min-height:60px;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:8px}
</style>
</head>
<body>
<h1>Xiaomi MIMO</h1>
<p>TTS y ASR en tiempo real</p>

<section>
<h2>🔊 TTS</h2>
<label>Texto</label>
<textarea id="tts-text" placeholder="Texto a sintetizar...">Hola, esto es una prueba.</textarea>
<label>Voz</label>
<div class="vg" id="vg"></div>
<label>Instrucciones (opcional)</label>
<input id="tts-prompt" placeholder="Ej: Habla en español neutro, sin acento chino" value="Speak in neutral Spanish, clearly">
<button class="btn-p" onclick="genTTS()">Generar y Escuchar</button>
<div class="spinner" id="ts">Generando...</div>
<audio id="ta" controls style="display:none"></audio>
<div class="result" id="tr"></div>
</section>

<section>
<h2>🎤 ASR en vivo <span style="font-size:11px;color:#888;font-weight:400">(requiere HTTPS 🔒)</span></h2>
<div class="row">
<button class="btn-g" id="rec-btn" onclick="toggleRec()">🎙 Iniciar grabación</button>
<button class="btn-s" onclick="clearTrans()">Limpiar</button>
</div>
<div class="tx-box" id="trans-box">Presiona grabar y empieza a hablar...</div>
<div class="result" id="ar"></div>
</section>

<script>
const VOICES = ["Mia","Chloe","Milo","Dean","mimo_default","冰糖","茉莉","苏打","白桃"];
let rec = null, chunks = [], transText = "";

function init() {
  const g = document.getElementById("vg");
  let sel = "Mia";
  VOICES.forEach(v => {
    const b = document.createElement("button");
    b.textContent = v; b.dataset.v = v;
    b.onclick = () => { g.querySelectorAll("button").forEach(x => x.classList.remove("act")); b.classList.add("act"); sel = v; };
    if (v === "Mia") b.classList.add("act");
    g.appendChild(b);
  });
  window.__v = () => sel;
  const a = document.getElementById("ta");
  a.onended = () => a.style.display = "none";
}

async function genTTS() {
  const text = document.getElementById("tts-text").value.trim();
  if (!text) return;
  const prompt = document.getElementById("tts-prompt").value.trim();
  const sp = document.getElementById("ts"), res = document.getElementById("tr"), a = document.getElementById("ta");
  sp.classList.add("active"); res.textContent = ""; a.style.display = "none";
  try {
    const body = {text, voice: window.__v()};
    if (prompt) body.prompt = prompt;
    const r = await fetch("/tts", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    if (!r.ok) { res.textContent = "Error: " + (await r.text()); return; }
    const blob = await r.blob();
    a.src = URL.createObjectURL(blob); a.style.display = "block";
    a.play();
    res.innerHTML = "<strong>✓</strong> " + (blob.size/1024).toFixed(0) + " KB";
  } catch(e) { res.textContent = "Error: " + e.message; }
  finally { sp.classList.remove("active"); }
}

async function toggleRec() {
  const btn = document.getElementById("rec-btn");
  if (rec && rec.state === "recording") {
    rec.stop();
    btn.className = "btn-g"; btn.innerHTML = "🎙 Iniciar grabación";
    document.querySelector(".rec-icon")?.remove();
    return;
  }
  if (!navigator.mediaDevices) { document.getElementById("ar").textContent = "Error: tu navegador no soporta grabación"; return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    chunks = []; transText = "";
    document.getElementById("trans-box").textContent = "Grabando...";
    document.getElementById("ar").textContent = "";
    rec = new MediaRecorder(stream, {mimeType: 'audio/webm;codecs=opus'});
    rec.ondataavailable = async (e) => {
      if (e.data.size > 0) chunks.push(e.data);
    };
    rec.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      if (chunks.length === 0) return;
      const blob = new Blob(chunks, {type: 'audio/webm'});
      document.getElementById("trans-box").textContent = "Transcribiendo...";
      try {
        const fd = new FormData();
        fd.append("audio", blob, "recording.webm");
        const r = await fetch("/asr", {method:"POST", body:fd});
        const data = await r.json();
        if (data.text) {
          transText += (transText ? " " : "") + data.text;
          document.getElementById("trans-box").textContent = transText;
        }
      } catch(e) { document.getElementById("ar").textContent = "Error: " + e.message; }
    };
    rec.start();
    btn.className = "btn-r"; btn.innerHTML = '<span class="rec-icon on"></span>Detener grabación';
  } catch(e) {
    const msg = e.name === "NotAllowedError" ? "Permiso denegado. Abre el candado 🔒 en la barra → Micrófono → Permitir, luego recarga." :
                e.name === "NotFoundError" ? "No se encontró micrófono." :
                "Error: " + e.message;
    document.getElementById("ar").textContent = msg;
  }
}

function clearTrans() {
  transText = ""; chunks = [];
  document.getElementById("trans-box").textContent = "Presiona grabar y empieza a hablar...";
  document.getElementById("ar").textContent = "";
}

init();
</script>
</body>
</html>
